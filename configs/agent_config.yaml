# Agent系统配置文件

# 基金经理配置
fund_manager:
  max_single_position: 0.20      # 单一仓位最大权重
  max_sector_exposure: 0.40      # 单一行业最大敞口
  min_cash_buffer: 0.05          # 最小现金缓冲
  rebalance_threshold: 0.05      # 再平衡触发阈值
  target_positions: 8            # 目标持仓数量

# 研究分析师配置
research_analyst:
  min_confidence_threshold: 0.6   # 最小信心阈值
  analysis_refresh_days: 7        # 分析刷新天数
  coverage_universe:               # 覆盖范围
    - technology
    - healthcare
    - finance
    - consumer

# 风控专员配置
risk_manager:
  max_portfolio_volatility: 0.18  # 最大组合波动率
  max_drawdown: 0.15              # 最大回撤
  var_confidence: 0.95            # VaR置信度
  stress_test_frequency: 7        # 压力测试频率(天)

# 系统架构师配置
system_architect:
  code_quality_threshold: 0.8     # 代码质量阈值
  test_coverage_minimum: 0.7      # 最小测试覆盖率
  performance_sla: 2.0            # 性能SLA(秒)
  auto_cleanup_enabled: true      # 自动清理开启